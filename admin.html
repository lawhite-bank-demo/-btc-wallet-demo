<!DOCTYPE html><html>
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Panel</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><h2>Admin Panel</h2><button onclick="adminLogout()">Logout</button>

<h3>Create New User</h3><input id="newUser" placeholder="Username">
<input id="newPin" placeholder="Pin">
<input id="newBalance" placeholder="Starting BTC"><button onclick="createUser()">Create User</button>

<h3>Modify User Balance</h3><input id="adminUser" placeholder="Username">
<input id="adminAmount" placeholder="BTC Amount"><button onclick="addBTC()">Add BTC</button>

<button onclick="removeBTC()">Remove BTC</button>

<h3>Users</h3><div id="userList"></div></div><script src="app.js"></script></body>
</html>
