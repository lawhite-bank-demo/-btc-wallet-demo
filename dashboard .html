<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Bitcoin Wallet</title><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head><body><div class="container"><h2>₿ Bitcoin Wallet</h2><button onclick="logout()">Logout</button>
